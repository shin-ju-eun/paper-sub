# 논문 구독 설정 (GitHub Actions용)
# 이 파일은 비밀번호를 포함하지 않습니다. 메일 비밀번호는 GitHub Secrets에 등록.
journals:
  Computers & Education: "0360-1315"
  International Journal of Educational Technology in Higher Education: "2365-9440"
  Interactive Learning Environments: "1049-4820"
  Journal of Computer Assisted Learning: "0266-4909"
  Education and Information Technologies: "1360-2357"
  Journal of Research on Technology in Education: "1539-1523"
  Educational Technology & Society: "1176-3647"

# 며칠 치를 수집할지. 2로 두면 하루 건너뛰어도 안전 (중복은 seen_dois.txt로 제거)
days_back: 2

# 저널당 최대 수집 논문 수
max_per_journal: 30

# OpenAlex polite pool용 이메일 (무료, 키 불필요)
mailto: jueunshin.us@gmail.com

# 초록이 없는 논문도 제목/링크만 표시
include_no_abstract: true

# 결과 다이제스트 저장 경로 (Actions에서 저장소에 커밋됨)
output_dir: ./digests

# 중복 방지용 DOI 캐시 (Actions에서 저장소에 커밋되어 유지됨)
seen_cache: ./seen_dois.txt

# 이메일 설정. GitHub Secrets에서 환경변수로 덮어씀.
# SMTP_HOST/SMTP_PORT/EMAIL_ENABLED는 기본값이 있어 Secrets에 안 넣어도 됨.
email:
  enabled: false
  smtp_host: smtp.gmail.com
  smtp_port: "587"
  user: ""
  password: ""
  to: ""
  subject_prefix: "[논문구독]"
